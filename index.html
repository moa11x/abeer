<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Abeer AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            color: white; font-family: Arial, sans-serif;
        }
        .abeer-title { font-size: 50px; color: #ff0055; font-weight: bold; letter-spacing: 5px; margin: 0; }
        button {
            margin-top: 30px; padding: 15px 40px; font-size: 20px;
            background: #ff0055; color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="overlay">
        <h1 class="abeer-title">ABEER</h1>
        <p>Interactive AR Experience</p>
        <button onclick="startAR()">ابدأ العرض</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <a-entity light="type: ambient; intensity: 1"></a-entity>

        <a-entity camera position="0 0 0"></a-entity>

        <a-entity id="coneParent" position="0 0 -2">
            <a-cone 
                id="myCone"
                radius-bottom="0.3" 
                radius-top="0" 
                height="0.7" 
                material="color: #ff0055; roughness: 0.3; metalness: 0.6;"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
            </a-cone>
        </a-entity>

    </a-scene>

    <script>
        function startAR() {
            document.getElementById('overlay').style.display = 'none';
            
            // للأيفون: طلب إذن الحساسات
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
        }

        // تحريك المخروط بالأصابع
        let cone = document.querySelector("#myCone");
        window.addEventListener("touchmove", (e) => {
            let touch = e.touches[0];
            let moveX = touch.clientX * 0.5;
            cone.setAttribute("rotation", {x: 0, y: moveX, z: 0});
        });
    </script>
</body>
</html>
