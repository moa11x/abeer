<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Abeer AR - Final</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            color: white; font-family: sans-serif;
        }
        .abeer-logo { font-size: 50px; color: #ff0055; font-weight: bold; letter-spacing: 5px; }
        button {
            margin-top: 20px; padding: 15px 40px; font-size: 18px;
            background: #ff0055; color: white; border: none; border-radius: 50px;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="overlay">
        <div class="abeer-logo">ABEER</div>
        <button onclick="startExperience()">ابدأ العرض</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <a-entity light="type: ambient; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; position: 1 1 1; intensity: 0.8"></a-entity>

        <a-entity id="pyramid-group" position="0 0 -2" rotation="0 45 0">
            <a-cone 
                radius-bottom="0.5" radius-top="0" height="0.8" segments-radial="4"
                material="color: #ff0055; flatShading: true;">
            </a-cone>
            
            <a-cone 
                radius-bottom="0.505" radius-top="0.01" height="0.81" segments-radial="4"
                material="color: #000000; wireframe: true; wireframe-linewidth: 5;">
            </a-cone>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        function startExperience() {
            document.getElementById('overlay').style.display = 'none';
            
            // طلب إذن الحساسات للأيفون
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(console.error);
            }
        }

        // تحريك الهرم باللمس
        let group = document.querySelector('#pyramid-group');
        let startX, startY;

        window.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', e => {
            let deltaX = e.touches[0].clientX - startX;
            let deltaY = e.touches[0].clientY - startY;
            
            let rotation = group.getAttribute('rotation');
            group.setAttribute('rotation', {
                x: rotation.x + deltaY * 0.5,
                y: rotation.y + deltaX * 0.5,
                z: 0
            });
            
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });
    </script>
</body>
</html>
